<?xml version="1.0" encoding="UTF-8"?>

<?xml-stylesheet href="chrome://global/skin/global.css"?>
<?xml-stylesheet href="chrome://namoroka/content/windows/preferences/preferences.css"?>

<!DOCTYPE prefwindow [ <!ENTITY % preferencesDTD SYSTEM "chrome://namoroka/locale/dtd/preferences.dtd">
%preferencesDTD;
]>

<window id="BrowserPreferences"
        windowtype="Browser:Preferences"
        title="&prefWindow.titleWin;"
        class="prefwindow"
        align="stretch"
        xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul">

    <script type="application/javascript" src="chrome://browser/content/utilityOverlay.js"></script>

    <stringbundleset id="preferencesbundleset">
        <stringbundle id="bundleBrand" src="chrome://branding/locale/brand.properties" />
        <stringbundle id="bundlePreferences" src="chrome://namoroka/locale/properties/preferences.properties" />
    </stringbundleset>

    <vbox id="topBar">
        <radiogroup id="viewGroup" class="chromeclass-toolbar" orient="horizontal">
            <radio id="mainTab" label="&paneMain.title;" />
            <radio id="homeTab" label="&paneHome.title;" />
            <radio id="searchTab" label="&paneSearch.title;" />
            <radio id="privacyTab" label="&panePrivacy.title;" />
            <radio id="syncTab" label="&paneSync.title;" />
        </radiogroup>
    </vbox>

    <deck id="mainDeck" flex="1">
        <vbox id="mainPane">
            
        </vbox>
    </deck>
</window>
